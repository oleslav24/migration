input_path: data/telegram_comments_12.25.csv
input_paths:
  - path: data/telegram_comments_12.25.csv
    source: telegram
  - path: DS/youtube_comments_12.25.csv
    source: youtube
output_dir: data/output
interim_dir: data/interim
time_window: 1h
min_text_length: 5
n_topics: 10
embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
embedding_backend: sentence-transformers
random_state: 42
chunk_size: 100000
anonymization_salt: local-dev-salt
save_interim_parquet: true
make_plots: true
max_rows:
language_detection:
  backend: rule-based
  fallback_backend: rule-based
  target_languages:
    - ru
    - en
    - uz
    - th
    - other
  fasttext_model_path:
sentiment:
  backend: rule-based
topic_model:
  backend: kmeans
  n_topics: 10
  label_top_n: 8
experiments:
  temporal: month
  group_comparison: true
literature:
  articles_dir: articles
  index_dir: data/literature_index
  chunk_size: 1200
  chunk_overlap: 200
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  embedding_backend: sentence-transformers
  backend: sklearn
  top_k: 8
  summarization:
    mode: extractive
    max_evidence_items: 20
    max_chars_per_evidence: 1500
    language: ru
    llm_provider: none
    llm_model: none
discovery:
  output_dir: data/discovery
  articles_dir: articles/discovered/pdf
  metadata_dir: articles/discovered/metadata
  year_from: 2015
  year_to: 2026
  max_results_per_query: 50
  max_pdf_downloads: 50
  languages:
    - en
    - ru
  providers:
    crossref: true
    openalex: true
    semantic_scholar: true
    arxiv: true
    manual_seed: true
  polite_delay_seconds: 1.0
  user_agent: "migration-research-bot/0.1 mailto:YOUR_EMAIL@example.com"
  relevance:
    min_score: 0.45
    title_weight: 0.45
    abstract_weight: 0.35
    keyword_weight: 0.20
  download:
    only_open_access: true
    respect_robots_txt: true
    allowed_mime_types:
      - application/pdf
