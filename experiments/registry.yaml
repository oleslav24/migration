experiments:
  - id: corpus_context
    title: Context-first corpus evidence pack
    runner: analyze-corpus
    agent_contract: agents/examples/corpus_analysis_agent_contract.yaml
    input_context: [data/output, data/discovery, tests/fixtures]
    expected_outputs: [context_pack.json, evidence_pack.json, context_report.md]
    quality_gates: [context_exists, evidence_pack_created]
    status: ready
    last_run: null
    parameters: []
  - id: toponym_urban_space
    title: Toponym and urban space analysis
    runner: toponym-agent
    agent_contract: agents/examples/toponym_urban_space_agent_contract.yaml
    input_context: [data/output, tests/fixtures]
    expected_outputs: [toponym_context_pack.json, toponym_evidence_pack.json, toponym_report.md]
    quality_gates: [source_paths_present, deterministic_sampling]
    status: ready
    last_run: null
    parameters:
      - name: random_state
        type: int
        default: 42
        min: 0
        max: 100000
  - id: toponym_research_workflow
    title: Toponym research workflow
    runner: toponym-agent
    agent_contract: agents/examples/toponym_urban_space_agent_contract.yaml
    input_context: [data/output, tests/fixtures]
    expected_outputs: [toponym_research_report.md, toponym_research_manifest.json, texts_by_toponym]
    quality_gates: [texts_by_toponym_exported, hypothesis_recorded, source_paths_present]
    status: ready
    last_run: null
    parameters:
      - name: dataset_scope
        type: string
        default: all
        choices: [all, telegram, youtube]
      - name: top_n_toponyms
        type: int
        default: 10
        min: 1
        max: 100
      - name: samples_per_toponym
        type: int
        default: 3
        min: 1
        max: 100
      - name: max_texts_per_toponym
        type: int
        default: 500
        min: 1
        max: 10000
      - name: random_state
        type: int
        default: 42
        min: 0
        max: 100000
  - id: research_story_e2e
    title: Research story E2E (toponym -> perception -> narrative -> coding)
    runner: research-story-e2e
    agent_contract: agents/examples/toponym_urban_space_agent_contract.yaml
    contracts:
      toponym: agents/examples/toponym_urban_space_agent_contract.yaml
      place_perception: agents/examples/place_perception_agent_contract.yaml
      migration_narrative: agents/examples/migration_narrative_agent_contract.yaml
      sampling: agents/examples/sampling_coding_agent_contract.yaml
    input_context: [data/output, tests/fixtures]
    expected_outputs: [research_story_e2e_report.md, research_story_e2e_summary.json, research_story_e2e_steps.csv]
    quality_gates: [source_paths_present, deterministic_sampling, no_unsupported_claims]
    status: ready
    last_run: null
    parameters:
      - name: hypothesis
        type: string
        default: ""
      - name: dataset_scope
        type: string
        default: all
        choices: [all, telegram, youtube]
      - name: top_n_toponyms
        type: int
        default: 10
        min: 1
        max: 100
      - name: samples_per_toponym
        type: int
        default: 5
        min: 1
        max: 100
      - name: max_texts_per_toponym
        type: int
        default: 500
        min: 1
        max: 10000
      - name: sample_size
        type: int
        default: 150
        min: 1
        max: 5000
      - name: stratify_by
        type: string
        default: source
        choices: [source, month, sentiment, topic_id, migration_driver]
      - name: sampling_toponym
        type: string
        default: ""
      - name: random_state
        type: int
        default: 42
        min: 0
        max: 100000
  - id: place_perception
    title: Place perception baseline analysis
    runner: place-perception
    agent_contract: agents/examples/place_perception_agent_contract.yaml
    input_context: [data/output, tests/fixtures]
    expected_outputs: [place_perception_distribution.csv, place_perception_report.md]
    quality_gates: [stable_labels, examples_have_sources]
    status: ready
    last_run: null
    parameters: []
  - id: sampling_coding
    title: Manual coding sample preparation
    runner: sampling-coding
    agent_contract: agents/examples/sampling_coding_agent_contract.yaml
    input_context: [data/output, tests/fixtures]
    expected_outputs: [coding_sample.csv, coding_codebook.md, coding_manifest.json, intercoder_template.csv, coding_sample_by_toponym.csv, coding_codebook_toponym.md, coding_manifest_toponym.json]
    quality_gates: [reproducible_sample, no_duplicates]
    status: ready
    last_run: null
    parameters:
      - name: toponym
        type: string
        default: ""
      - name: stratify_by
        type: string
        default: source
        choices: [source, month, sentiment, topic_id, migration_driver]
      - name: sample_size
        type: int
        default: 100
        min: 1
        max: 5000
      - name: random_state
        type: int
        default: 42
        min: 0
        max: 100000
  - id: migration_narratives
    title: Migration narrative evidence matrix
    runner: migration-narrative
    agent_contract: agents/examples/migration_narrative_agent_contract.yaml
    input_context: [data/output, tests/fixtures]
    expected_outputs: [migration_narrative_evidence.json, migration_narrative_matrix.csv, migration_narrative_report.md]
    quality_gates: [evidence_ids_present]
    status: ready
    last_run: null
    parameters: []
  - id: literature_bridge
    title: Literature to corpus bridge
    runner: literature-bridge
    agent_contract: agents/examples/literature_bridge_agent_contract.yaml
    input_context: [data/output, data/literature_index, config.yaml]
    expected_outputs: [literature_corpus_bridge.json, literature_corpus_bridge.md]
    quality_gates: [missing_index_graceful]
    status: ready
    last_run: null
    parameters: []
